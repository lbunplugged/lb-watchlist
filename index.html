<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB's Watch List</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.container {
  padding: 16px;
}

/* HEADER */
.header {
  padding: 20px;
  border-radius: 16px;
  background: #0b0b0b;
  margin-bottom: 20px;
  border: 1px solid rgba(255,215,0,0.15);
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin-top: 8px;
  color: #bbb;
  font-size: 14px;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

.btn:active {
  background: linear-gradient(90deg, #7a5c00, #d4af37);
}

/* CARD */
.card {
  background: #0b0b0b;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,215,0,0.15);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.green { background: #0f5132; }
.yellow { background: #6b5e00; }
.red { background: #5a1a1a; }

.check { color: #00c853; }
.x { color: #ff5252; }

.hidden {
  display: none;
}

.section-title {
  color: gold;
  margin-top: 14px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>LB’s Watch List</h1>
    <p>Welcome to your luxury scanner. Built for clarity, precision, and real setups — not noise.</p>
  </div>

  <button class="btn" onclick="loadSample()">Night Scan</button>

  <div id="results"></div>

</div>

<script>

function getExplanation(stock) {
  let reasons = [];

  if (stock.priceAbove20)
    reasons.push("Price is holding above the 20 EMA, showing a strong trend foundation.");

  if (stock.emaBullish)
    reasons.push("The 5 EMA is above the 20 EMA, signaling short-term momentum is leading upward.");

  if (stock.macdBullish)
    reasons.push("MACD is above its signal line, confirming bullish momentum is active.");

  if (stock.rsiGood)
    reasons.push("RSI is in a healthy range, meaning strength without being overextended.");

  if (!stock.volumeGood)
    reasons.push("Volume is slightly weak, so participation is not fully confirming the move.");

  return reasons.join(" ");
}

function getQuickIdea(stock) {
  if (stock.score >= 80)
    return "Strong setup. Look for continuation or pullback entry.";
  if (stock.score >= 65)
    return "Decent setup. Watch for confirmation at open.";
  return "Weak setup. Stay patient and avoid forcing entries.";
}

function renderCard(stock) {
  const verdict =
    stock.score >= 80 ? "Strong Setup" :
    stock.score >= 65 ? "Watch" : "Avoid";

  const color =
    stock.score >= 80 ? "green" :
    stock.score >= 65 ? "yellow" : "red";

  return `
  <div class="card" onclick="toggle(this)">
    
    <div class="row">
      <h2>${stock.ticker}</h2>
      <div class="badge ${color}">${verdict}</div>
    </div>

    <p>${getQuickIdea(stock)}</p>

    <div class="hidden">

      <div class="section-title">FULL BREAKDOWN</div>

      <p>${getExplanation(stock)}</p>

      <p class="check">${stock.priceAbove20 ? "✓" : "✗"} Price above 20 EMA</p>
      <p class="${stock.emaBullish ? "check" : "x"}">${stock.emaBullish ? "✓" : "✗"} 5 EMA vs 20 EMA</p>
      <p class="${stock.macdBullish ? "check" : "x"}">${stock.macdBullish ? "✓" : "✗"} MACD</p>
      <p class="${stock.rsiGood ? "check" : "x"}">${stock.rsiGood ? "✓" : "✗"} RSI</p>
      <p class="${stock.volumeGood ? "check" : "x"}">${stock.volumeGood ? "✓" : "✗"} Volume</p>

      <p><b>Quick trade idea:</b> ${getQuickIdea(stock)}</p>

    </div>

  </div>
  `;
}

function toggle(card) {
  const hidden = card.querySelector(".hidden");
  hidden.classList.toggle("hidden");
}

function loadSample() {
  const data = [
    {
      ticker: "MRK",
      score: 85,
      priceAbove20: true,
      emaBullish: true,
      macdBullish: true,
      rsiGood: true,
      volumeGood: false
    },
    {
      ticker: "XOM",
      score: 70,
      priceAbove20: true,
      emaBullish: true,
      macdBullish: true,
      rsiGood: false,
      volumeGood: false
    }
  ];

  document.getElementById("results").innerHTML =
    data.map(renderCard).join("");
}

</script>

</body>
</html>
